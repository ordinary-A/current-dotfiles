general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/alaadin/Wallpapers/current/Wallpaper.png

    blur_passes = 4
    blur_size = 7
    brightness = 0.5
    contrast = 1.0
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 90
    font_family = DepartureMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(166, 173, 200, 1.0)
    font_size = 20
    font_family = DepartureMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
}

# User
label {
    monitor =
    text =   Alaadin
    color = rgba(137, 180, 250, 1.0)
    font_size = 16
    font_family = DepartureMono Nerd Font
    position = 0, -130
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
}

# Password input
input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(137, 180, 250, 0.6)
    inner_color = rgba(30, 30, 46, 0.8)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <i>Wrong password</i>
    fail_timeout = 2000
    capslock_color = rgba(250, 179, 135, 1.0)
    position = 0, -200
    halign = center
    valign = center
}

# Uptime
label {
    monitor =
    text = cmd[update:60000] echo "󰔚  $(uptime -p | sed 's/up //')"
    color = rgba(108, 112, 134, 1.0)
    font_size = 13
    font_family = DepartureMono Nerd Font
    position = 0, -270
    halign = center
    valign = center
}
